<!doctype html>
<meta charset="utf-8">
<title>Logistics Extension Transfer Probe</title>
<pre id="out">running</pre>
<script type="module">
import { GameEngine } from "../src/systems/game_systems.js";
import { UIManager } from "../src/ui/ui.js";

const out = document.getElementById("out");
const source = { id: "storehouse_1", type1: "storehouse", x: 530, y: 180, lv: 1 };
const target = { id: "factory_1", type1: "timber_processing_plant", x: 180, y: 290, lv: 1 };
const originalSourcePort = { dir: "down", width: 1, defIndex: -1, slotIndex: 0, x: 530, y: 190 };
const targetPort = { dir: "left", width: 1, defIndex: -1, slotIndex: 0, x: 170, y: 290 };

GameEngine.state.mapEntities = [
  {
    ...source,
    outputTargets: [{ id: target.id, lineId: "gA", filter: "wood", sourcePort: originalSourcePort }]
  },
  target
];
GameEngine.state.logisticsLines = [
  {
    id: "a1",
    groupId: "gA",
    sourceId: source.id,
    x: 530,
    y: 220,
    routePoints: [{ x: 530, y: 190 }, { x: 530, y: 250 }],
    routeWidth: 1,
    sourcePort: originalSourcePort,
    order: 0
  },
  {
    id: "a2",
    groupId: "gA",
    sourceId: source.id,
    x: 450,
    y: 250,
    routePoints: [{ x: 530, y: 250 }, { x: 370, y: 250 }],
    routeWidth: 1,
    sourcePort: originalSourcePort,
    order: 2
  },
  {
    id: "a3",
    groupId: "gA",
    sourceId: source.id,
    x: 370,
    y: 270,
    routePoints: [{ x: 370, y: 250 }, { x: 370, y: 290 }],
    routeWidth: 1,
    sourcePort: originalSourcePort,
    order: 4
  }
];

const conn = GameEngine.state.mapEntities[0].outputTargets[0];
UIManager.upsertLogisticsLine({
  lineId: "gA",
  sourceEnt: GameEngine.state.mapEntities[0],
  targetEnt: GameEngine.state.mapEntities[1],
  points: [{ x: 370, y: 290 }, { x: 250, y: 290 }, { x: 170, y: 290 }],
  routeWidth: 1,
  sourcePort: { dir: "left", width: 1, x: 370, y: 290, sourceType: "logistics_line" },
  targetPort,
  conn
});

const transfer = UIManager.getConnectionTransferRoute(GameEngine.state.mapEntities[0], GameEngine.state.mapEntities[1], conn);
const hasPointNear = (points, x, y) => Array.isArray(points) && points.some(point => Math.hypot(point.x - x, point.y - y) <= 1);
const result = {
  connSourcePort: conn.sourcePort,
  connTargetPort: conn.targetPort,
  transferPointCount: transfer?.points?.length || 0,
  hasOriginalSourcePort: hasPointNear(transfer?.points, originalSourcePort.x, originalSourcePort.y),
  hasOldFirstHorizontal: hasPointNear(transfer?.points, 450, 250),
  hasOldBend: hasPointNear(transfer?.points, 370, 250),
  hasNewExtension: hasPointNear(transfer?.points, 250, 290),
  transferPoints: transfer?.points || []
};
const ok = result.connSourcePort?.x === originalSourcePort.x &&
  result.connSourcePort?.y === originalSourcePort.y &&
  result.connSourcePort?.sourceType !== "logistics_line" &&
  result.transferPointCount >= 6 &&
  result.hasOriginalSourcePort &&
  result.hasOldFirstHorizontal &&
  result.hasOldBend &&
  result.hasNewExtension;

out.textContent = JSON.stringify({ ok, ...result }, null, 2);
if (!ok) throw new Error("Logistics extension transfer probe failed");
</script>
