<!doctype html>
<meta charset="utf-8">
<title>Logistics Auto Merge Probe</title>
<pre id="out">running</pre>
<script type="module">
import { GameEngine } from "../src/systems/game_systems.js";
import { UIManager } from "../src/ui/ui.js";
import { LogisticsRenderer } from "../src/renderers/logistics_renderer.js";

const out = document.getElementById("out");
const source = { id: "warehouse_1", type1: "warehouse", x: 410, y: 90 };
const target = { id: "factory_1", type1: "lumber_mill", x: 210, y: 210 };

GameEngine.state.mapEntities = [
  {
    ...source,
    outputTargets: [{ id: target.id, lineId: "gA", filter: "wood" }]
  },
  target
];
GameEngine.state.logisticsLines = [
  { id: "b1", groupId: "gB", sourceId: target.id, targetId: target.id, x: 310, y: 160, routePoints: [{ x: 310, y: 110 }, { x: 310, y: 210 }], routeWidth: 1, order: 0 },
  { id: "b2", groupId: "gB", sourceId: target.id, targetId: target.id, x: 260, y: 210, routePoints: [{ x: 310, y: 210 }, { x: 210, y: 210 }], routeWidth: 1, order: 2 }
];

const conn = GameEngine.state.mapEntities[0].outputTargets[0];
UIManager.upsertLogisticsLine({
  lineId: "gA",
  sourceEnt: GameEngine.state.mapEntities[0],
  targetEnt: target,
  points: [{ x: 410, y: 90 }, { x: 410, y: 110 }, { x: 310, y: 110 }],
  routeWidth: 1,
  conn
});

const groupIds = [...new Set(GameEngine.state.logisticsLines.map(line => line.groupId))];
const route = UIManager.getConnectionTransferRoute(GameEngine.state.mapEntities[0], target, conn);
const maxJump = (points) => Math.max(...points.slice(1).map((p, i) => Math.hypot(p.x - points[i].x, p.y - points[i].y)));
const turnRect = LogisticsRenderer.getLogisticsCellRects(route?.points || [], 1, true)
  .find(rect => rect.cellKey === "310,110");
const result = {
  groupIds,
  connLineId: conn.lineId,
  routePointCount: route?.points?.length || 0,
  routeMaxJump: route?.points ? maxJump(route.points) : null,
  turnRect: turnRect ? {
    cellKey: turnRect.cellKey,
    dirX: Number(turnRect.dirX.toFixed(3)),
    dirY: Number(turnRect.dirY.toFixed(3)),
    isTurn: !!turnRect.isTurn
  } : null,
  routePoints: route?.points || []
};
const ok = groupIds.length === 1 &&
  conn.lineId === "gA" &&
  result.routePointCount >= 5 &&
  result.routeMaxJump <= 100 &&
  result.turnRect?.isTurn === true &&
  result.turnRect.dirX < -0.6 &&
  result.turnRect.dirY > 0.6;

out.textContent = JSON.stringify({ ok, ...result }, null, 2);
if (!ok) throw new Error("Logistics auto-merge probe failed");
</script>
