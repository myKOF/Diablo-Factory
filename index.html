<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗黑煉金工廠：末日準備中</title>
    <link rel="stylesheet" href="./style.css">
    <script>
        // 隨機種子系統 (E2E 測試決定性保證)
        const urlParams = new URLSearchParams(window.location.search);
        let seedStr = urlParams.get('seed');
        if (!seedStr) {
            seedStr = Date.now().toString();
            // 我們不重新導向，只記在全域，讓錄製器可以抓到它
        }
        window.GAME_SEED = parseInt(seedStr);
        let currentSeed = window.GAME_SEED;
        // 替換 Math.random 以確保每次地圖生成都一樣
        Math.random = function() {
            let t = currentSeed += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        };

        // 診斷指令：如果使用 file:// 協議開啟，ES 模組將無法運作
        if (window.location.protocol === 'file:') {
            alert('警告：請使用 Web Server（如 Vite 或 Live Server）開啟此網頁，否則 JavaScript 模組將無法加載。');
        }
        window.onerror = function(msg, url, line) {
            console.error('全局錯誤捕捉:', msg, '在', url, '第', line, '行');
            const debug = document.createElement('div');
            debug.style.color = 'red';
            debug.innerText = '系統錯誤：' + msg;
            document.body.appendChild(debug);
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
    <div id="game_container">
        <!-- 底層：動畫渲染層 (由 Phaser 接管) -->
        <div id="phaser_container"></div>
        
        <!-- 上層：UI 互動層 -->
        <div id="ui_layer"></div>
    </div>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
